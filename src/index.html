<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>MindDesk</title>
    <link rel="stylesheet" href="styles.css">
</head>
  <body>
    <main class="container">
      <section class="taskbar">
        <div class="grid-apps">
          <!-- Aquí irán los iconos de las apps -->
          <div class="icon1">
            <img src="./assets/icons/windows12.png" class="windows">
          </div>
          <div class="icon2">
            <img src="./assets/icons/search.png" class="search">
          </div>
          <div class="icon3">
            <img src="./assets/icons/user.png" class="user">
          </div>
          <!-- Se pueden añadir más iconos o botones -->
        </div>
        <hr class="hr_vertical" id="bet1-2">
        <div class="grid-apps-2">
          <div class="apps-icon icon2"></div>
          <div class="apps-icon icon2"></div>
          <div class="apps-icon icon2"></div>
          <div class="apps-icon icon2"></div>
          <div class="apps-icon icon2"></div>
          <div class="apps-icon icon2"></div>
          <div class="apps-icon icon2"></div>
          <div class="apps-icon icon2"></div>
          <div class="apps-icon icon2"></div>
        </div>
        <!-- <hr class="hr_vertical" id="bet2-3"> -->
        <div class="grid-apps-3">
          <div class="apps-icon icon1">
            <img src="./assets/icons/games.png" id="games">
          </div>
          <div class="apps-icon icon2">
            <div class="clock">
              <div class="flip-clock">
                <div class="flip-unit">
                  <div class="top">12</div>
                  <div class="bottom">12</div>
                </div>
                <div class="flip-unit">
                  <div class="top">45</div>
                  <div class="bottom">45</div>
                </div>
              </div>
            </div>
          </div>
        </div>
        <!-- <div class="time">12:45</div>  Aquí se podrña poner el reloj o alguna otra info -->
      </section>
      
    </main>
  </body>
</html>
